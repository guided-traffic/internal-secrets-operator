# Post-Quantum Cryptography Examples
#
# These Secrets demonstrate the post-quantum keypair generation types:
# - ML-KEM (FIPS 203): Key encapsulation mechanism
# - ML-DSA (FIPS 204): Lattice-based digital signatures
# - SLH-DSA (FIPS 205): Hash-based digital signatures (conservative)
#
# Usage:
#   kubectl apply -f secret_post_quantum.yaml
#   kubectl get secret <name> -o yaml
#
---
# ML-KEM-768 (default) – Post-quantum key encapsulation
apiVersion: v1
kind: Secret
metadata:
  name: pq-kem-secret
  annotations:
    iso.gtrfc.com/autogenerate: kem-key
    iso.gtrfc.com/type.kem-key: mlkem
    iso.gtrfc.com/param.kem-key: "768"
type: Opaque
data: {}
---
# ML-KEM-1024 – Higher security level
apiVersion: v1
kind: Secret
metadata:
  name: pq-kem-1024-secret
  annotations:
    iso.gtrfc.com/autogenerate: kem-key
    iso.gtrfc.com/type.kem-key: mlkem
    iso.gtrfc.com/param.kem-key: "1024"
type: Opaque
data: {}
---
# ML-DSA-65 (default) – Post-quantum digital signature
apiVersion: v1
kind: Secret
metadata:
  name: pq-mldsa-secret
  annotations:
    iso.gtrfc.com/autogenerate: signing-key
    iso.gtrfc.com/type.signing-key: mldsa
    iso.gtrfc.com/param.signing-key: "65"
type: Opaque
data: {}
---
# ML-DSA-87 – Higher security level
apiVersion: v1
kind: Secret
metadata:
  name: pq-mldsa-87-secret
  annotations:
    iso.gtrfc.com/autogenerate: signing-key
    iso.gtrfc.com/type.signing-key: mldsa
    iso.gtrfc.com/param.signing-key: "87"
type: Opaque
data: {}
---
# SLH-DSA-128s (default) – Hash-based signature, small signatures
apiVersion: v1
kind: Secret
metadata:
  name: pq-slhdsa-secret
  annotations:
    iso.gtrfc.com/autogenerate: signing-key
    iso.gtrfc.com/type.signing-key: slhdsa
    iso.gtrfc.com/param.signing-key: "128s"
type: Opaque
data: {}
---
# SLH-DSA-256f – Hash-based signature, fast signing, larger signatures
apiVersion: v1
kind: Secret
metadata:
  name: pq-slhdsa-256f-secret
  annotations:
    iso.gtrfc.com/autogenerate: signing-key
    iso.gtrfc.com/type.signing-key: slhdsa
    iso.gtrfc.com/param.signing-key: "256f"
type: Opaque
data: {}
---
# Mixed: Classical + Post-Quantum in a single Secret
# Use separate fields for classical and PQ keys
apiVersion: v1
kind: Secret
metadata:
  name: pq-mixed-secret
  annotations:
    iso.gtrfc.com/autogenerate: password,tls-key,kem-key,signing-key,hash-signing-key
    iso.gtrfc.com/type: string
    iso.gtrfc.com/length: "32"
    iso.gtrfc.com/type.tls-key: ecdsa
    iso.gtrfc.com/curve.tls-key: "P-256"
    iso.gtrfc.com/type.kem-key: mlkem
    iso.gtrfc.com/param.kem-key: "768"
    iso.gtrfc.com/type.signing-key: mldsa
    iso.gtrfc.com/param.signing-key: "65"
    iso.gtrfc.com/type.hash-signing-key: slhdsa
    iso.gtrfc.com/param.hash-signing-key: "128s"
type: Opaque
data: {}
